analyze_topic_task:
  description: >
    Analyze "{topic}" and create a practical learning roadmap with exactly
    three levels: Beginner, Intermediate, and Advanced.

    MANDATORY FIRST STEP — YOU MUST SEARCH BEFORE DOING ANYTHING ELSE:
    - Search for "{topic} learning roadmap 2026" or similar query first.
    - If the results don't cover all three levels well, do one follow-up
      search (e.g. "{topic} beginner to advanced curriculum").
    - Do a third search only if a specific level still lacks coverage.
    - Maximum 3 searches total. Stop searching after 3 regardless.
    - Use what you find to inform your roadmap — do not ignore search results.

    STRICT RULES:
    - Include only concepts directly relevant to becoming practically
      proficient in {topic}.
    - Exclude academic, historical, theoretical, or low-impact topics
      unless they are essential prerequisites.
    - Prioritize concepts, tools, frameworks, techniques, and workflows
      used in real-world practice.
    - Follow the Pareto Principle: 20% of concepts that give 80% of
      practical value.
    - Organize concepts in logical learning sequence where each level
      builds on the previous.
    - Prefer depth in essential concepts over breadth.

    For each level provide:
    - A short learning objective
    - Estimated duration in weeks
    - 4-8 concepts arranged in learning order

    Do not include learning resources.

  expected_output: >
    JSON with exactly three keys: beginner, intermediate, advanced.
    Each level contains: description, estimated_weeks, concepts (list of strings).

  agent: analyst

  # expected_output: >
  #   JSON with exactly three keys:
  #   beginner,
  #   intermediate,
  #   advanced.

  #   Each level contains:
  #   - description
  #   - estimated_weeks
  #   - concepts (list of strings)

  # agent: analyst


query_generation_task:
  description: >
    Using the roadmap output, generate the smallest possible set of search
    queries that still covers every concept across all three levels.

    STRICT RULES:
    - Maximum 6 queries total across all levels.
    - Combine related concepts from the same level into one broad query.
    - Only generate a separate query if a concept is genuinely unrelated
      to anything else in its level.
    - Each query must be specific enough to return practical tutorials,
      documentation, or courses — not just definitions.
    - Format each query to include the topic name and resource type hints
      (e.g. "tutorial", "course", "documentation", "guide").

    Target:
    - Beginner: 1-2 queries max
    - Intermediate: 1-2 queries max
    - Advanced: 1-2 queries max

  expected_output: >
    A JSON object with keys: beginner, intermediate, advanced.
    Each key maps to a list of 1-2 search query strings.
    Maximum 6 queries total.

  agent: query_generator
  context:
    - analyze_topic_task

find_resources_task:
  description: >
    You have been given a pre-approved list of search queries.
    Use ONLY these queries to search the web — do not generate,
    modify, or add any new queries under any circumstances.

    STRICT RULES:
    - Execute each provided query exactly once using the search tool.
    - Do not search beyond the provided query list.
    - From the results, assign the most relevant resources to each concept.
    - For every concept provide up to 3 resources.

    Resource types: video, article, course, documentation, project

    Selection rules:
    - Only include resources directly related to {topic}.
    - Prefer official documentation whenever available.
    - Prefer modern, practical resources over theoretical ones.

    Before finishing, verify every concept has at least one resource.
    If a concept is missing, use the closest existing search result —
    do NOT run a new search. If your get {revision_notes} fix only duplicate_resources, missing_resources
    do NOT touch any other type of issue just fix the issue that I've suggested

  expected_output: >
    A roadmap structure with every concept containing:
    - title
    - url
    - type
    - short reason

  context:
    - analyze_topic_task
    - query_generation_task

  agent: resource_hunter


build_roadmap_task:
  description: >
    Using ONLY the analysis_output and resources_output provided,
    assemble the final roadmap.

    Arrange all concepts in the most logical learning order.
    Do not invent concepts or resources that are not present in the
    provided inputs.

    For every concept add:
    - completed: false
    - difficulty: Easy | Medium | Hard
    - priority: Must-do | Optional

    Arrange concepts in logical learning order.
    Output must be ready for rendering in a web app or exporting to
    PDF/Notion without additional formatting.

    Use this analysis: {analysis_output}
    Use these resources: {resources_output}
    If revision notes exist, fix only issues related to incorrect ordering and incorrect difficulty and incorrect priority or any type of logical error that doesn't require you to search the internet don't try to resolve the missing resources or duplicate resources: {revision_notes}


  expected_output: >
    Final JSON with keys: beginner, intermediate, advanced.
    Every concept contains: name, resources, completed, difficulty, priority.


  agent: roadmap_architect


review_roadmap_task:
  description: >
    Review the completed roadmap.

    Verify:
    - logical ordering
    - missing prerequisites
    - missing resources
    - duplicate concepts or resources(you can accept duplicate resources if one resource can be used through out other levels also)
    - incorrect difficulty labels
    - incorrect priorities

    Approve if everything is satisfactory, otherwise return revision notes.

  expected_output: >
    Return ONLY one of the following JSON objects.

    If the roadmap satisfies all review criteria, return EXACTLY:

    {
      "status": "approved"
    }

    Otherwise return EXACTLY:

    {
      "status": "needs_revision",
      "issues": [
        {
          "type": "<one of: missing_concepts, missing_resources, duplicate_resources, incorrect_order, incorrect_difficulty, incorrect_priority, formatting, invalid_json>",
          "description": "<what needs to be fixed>"
        }
      ]
    }

    You are ONLY a reviewer.

    Never rewrite, regenerate, or improve the roadmap yourself.

    Your responsibility is ONLY to review the roadmap produced by the previous task, identify any issues, and return the appropriate JSON object.

    Return raw JSON only.

    Do not wrap the response in markdown.

    Do not use ```json.

  context:
    - build_roadmap_task

  agent: quality_reviewer


edit_roadmap_task:
  description: >
    You are given an existing roadmap_output and reviewer revision notes.

    Your job is to modify the existing roadmap, not recreate it.
    Preserve every part that is already correct.
    Only fix the issues listed in {revision_notes}.

    STRICT RULES:
    - Never regenerate the roadmap from scratch.
    - Never replace correct sections just to restyle them.
    - Only change what is necessary to address the reviewer issues.
    - Use web search only when a fix requires new or replacement resources.
    - If no web search is needed, do not search.

    Use this topic: {topic}
    Use this existing roadmap: {roadmap_output}
    Use these reviewer notes: {revision_notes}

  expected_output: >
    Final JSON with keys: beginner, intermediate, advanced.
    The output must be the revised version of the existing roadmap, with only
    the reviewer issues fixed.

  agent: roadmap_editor


review_revision_task:
  description: >
    Review the roadmap that was just edited.

    Verify:
    - logical ordering
    - missing prerequisites
    - missing resources
    - duplicate concepts or resources
    - incorrect difficulty labels
    - incorrect priorities

    Approve if everything is satisfactory, otherwise return revision notes.

    Review this roadmap: {roadmap_output}
    Previous reviewer notes, if any: {revision_notes}

  expected_output: >
    Return ONLY one of the following JSON objects.

    If the roadmap satisfies all review criteria, return EXACTLY:

    {
      "status": "approved"
    }

    Otherwise return EXACTLY:

    {
      "status": "needs_revision",
      "issues": [
        {
          "type": "<one of: missing_concepts, missing_resources, duplicate_resources, incorrect_order, incorrect_difficulty, incorrect_priority, formatting, invalid_json>",
          "description": "<what needs to be fixed>"
        }
      ]
    }

    You are ONLY a reviewer.
    Never rewrite, regenerate, or improve the roadmap yourself.
    Return raw JSON only.
    Do not wrap the response in markdown.
    Do not use ```json.

  agent: quality_reviewer