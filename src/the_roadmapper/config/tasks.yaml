analyze_topic_task:
  description: >
    Research "{topic}" and design a practical learning path.

    Search the web to understand how experienced developers and educators
    structure the learning progression for this topic.

    Identify the essential concepts and organize them into three levels:
    Beginner, Intermediate, and Advanced.

    Focus only on determining WHAT should be learned and WHEN it should
    be learned.

    Do not recommend learning resources.

  expected_output: >
    AnalysisOutput

  agent: analyst



query_generation_task:
  description: >
    Generate search queries for every concept in the learning path.

    Group related concepts whenever one search query can retrieve useful
    resources for multiple concepts.

    Produce queries that maximize search quality while avoiding unnecessary
    searches.

  expected_output: >
    QueryOutput

  context:
    - analyze_topic_task

  agent: query_generator

find_resources_task:
  description: >
    Execute ONLY the provided search queries.

    Search the web and collect the highest quality learning resources for
    every concept.

    Do not modify the learning path.

    Do not generate additional search queries.

    If revision notes are provided, only replace or add resources required
    to resolve those issues.

  expected_output: >
    ResourceOutput

  context:
    - query_generation_task
    - analyze_topic_task

  agent: resource_hunter


build_roadmap_task:
  description: >
    Assemble the final roadmap using ONLY the provided learning path and
    collected resources.

    Organize the concepts into the most logical progression.

    Assign:
    - completed
    - difficulty
    - priority

    If revision notes exist, fix only roadmap-related issues that do not
    require additional web searches.

  expected_output: >
    Roadmap

  agent: roadmap_architect


review_roadmap_task:
  description: >
    Review the roadmap.

    Verify:
    - logical ordering
    - missing prerequisites
    - missing resources
    - duplicate resources
    - difficulty labels
    - priority labels

    Approve the roadmap if no issues are found.
    Otherwise return structured revision notes.

  expected_output: >
    ReviewOutput

  context:
    - build_roadmap_task

  agent: quality_reviewer


edit_roadmap_task:
  description: >
    Update the existing roadmap using the reviewer feedback.

    Preserve every correct section.

    Modify only the parts required to resolve the reported issues.

    Search the web only if resolving an issue requires replacing or adding
    learning resources.

    current roadmap: {roadmap_output}
    Revision nots :{revision_notes}
  expected_output: >
    Roadmap

  agent: roadmap_editor

    

review_revision_task:
  description: >
    Review the revised roadmap using the same quality criteria as the
    initial review.
    {roadmap_output}

  expected_output: >
    ReviewOutput


  agent: quality_reviewer