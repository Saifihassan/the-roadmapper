analyze_topic_task:
  description: >
    Analyze "{topic}" and create a practical learning roadmap with exactly
    three levels: Beginner, Intermediate, and Advanced.

    STRICT RULES:
    - Include only concepts that are directly relevant to becoming
      practically proficient in {topic}.
    - Exclude academic, historical, theoretical, or low-impact topics
      unless they are essential prerequisites for understanding or
      applying {topic}.
    - Prioritize concepts, tools, frameworks, techniques, and workflows
      that are commonly used in real-world practice.
    - Follow the Pareto Principle: focus on the 20% of concepts that
      provide 80% of the practical value.
    - Organize concepts in a logical learning sequence where each level
      naturally builds on the previous one.
    - Do not overwhelm the learner with exhaustive coverage. Prefer
      depth in essential concepts over breadth.

    For each level provide:
    - A short learning objective
    - Estimated duration in weeks
    - 4-8 concepts arranged in learning order

    Do not include learning resources.

  expected_output: >
    JSON with exactly three keys:
    beginner,
    intermediate,
    advanced.

    Each level contains:
    - description
    - estimated_weeks
    - concepts (list of strings)

  agent: analyst


find_resources_task:
  description: >
    Using the roadmap created previously, find high-quality learning
    resources for every concept.

    STRICT SEARCH RULES:
    - Maximum search budget: {search_budget}
    - Use ONE broad search per level covering all concepts together.
    - Only do a follow-up search if a concept has zero usable results
      from the first pass — not just to find better results.
    - Never search per concept individually.
    - Reuse results across related concepts wherever possible.

    Suggested strategy:
    - Beginner: 1 search (2 max)
    - Intermediate: 1 search (2 max)
    - Advanced: 1 search (2 max)

    For every concept provide up to 3 resources.

    Resource types:
    - video
    - article
    - course
    - documentation
    - project

    Selection rules:
    - Only include resources directly related to {topic}.
    - Prefer official documentation whenever available.
    - Prefer modern, practical resources over theoretical ones.
    - Avoid duplicate resources across concepts unless absolutely necessary.

    Before finishing, verify every concept has at least one resource.
    If any concept is missing, do one targeted search before submitting.

  expected_output: >
    Same roadmap structure with every concept containing:
    - title
    - url
    - type
    - short reason

  context:
    - analyze_topic_task

  agent: resource_hunter


build_roadmap_task:
  description: >
    Combine the analyzed roadmap with gathered resources into one final roadmap.

    For every concept add:
    - completed: false
    - difficulty: Easy | Medium | Hard
    - priority: Must-do | Optional

    Arrange concepts in logical learning order.
    Output must be ready for rendering in a web app or exporting to
    PDF/Notion without additional formatting.

  expected_output: >
    Final JSON with keys: beginner, intermediate, advanced.
    Every concept contains: name, resources, completed, difficulty, priority.

  context:
    - analyze_topic_task
    - find_resources_task

  agent: roadmap_architect


review_roadmap_task:
  description: >
    Review the completed roadmap.

    Verify:
    - logical ordering
    - missing prerequisites
    - missing resources
    - duplicate concepts or resources
    - incorrect difficulty labels
    - incorrect priorities

    Approve if everything is satisfactory, otherwise return revision notes.

  expected_output: >
    Either:
    { "status": "approved", "roadmap": {...} }
    or:
    { "status": "needs_revision", "issues": [] }

  context:
    - build_roadmap_task

  agent: quality_reviewer